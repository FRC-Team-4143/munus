name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # slack_signing_secret defaults to blank, and _verify_slack_signature fails closed
    # (503) when it's blank — tests compute their own Slack signature from whatever
    # this is set to, so any non-blank placeholder here makes both sides agree.
    env:
      SLACK_SIGNING_SECRET: ci-placeholder-signing-secret
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
