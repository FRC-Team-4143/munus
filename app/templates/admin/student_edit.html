{% extends "admin/base.html" %}
{% set active_page = "students" %}
{% block title %}Edit Student — Munus Admin{% endblock %}

{% block content %}
<h2 class="mb-3">Edit Student</h2>
<div class="card">
  <div class="card-body">
    <form method="post" action="/admin/students/{{ student.id }}/edit">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input name="name" class="form-control" value="{{ student.name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Level</label>
        <select name="level" class="form-select" required>
          {% for l in levels %}
          <option value="{{ l.value }}" {% if l == student.level %}selected{% endif %}>{{ l | levellabel }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Team Number <small class="text-muted">(optional)</small></label>
        <input name="team_number" class="form-control" value="{{ student.team_number or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Slack User ID <small class="text-muted">(optional)</small></label>
        <input name="slack_user_id" class="form-control" value="{{ student.slack_user_id or '' }}">
      </div>
      <div class="d-flex justify-content-between">
        <a href="/admin/students" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
